<div id="chat-app" style="font-family: sans-serif; border: 1px solid #ccc; background: #fff; padding: 10px; max-width: 400px;">
    <div id="messages" style="height: 250px; overflow-y: scroll; border-bottom: 1px solid #eee; margin-bottom: 10px; font-size: 13px;"></div>
    <input type="text" id="username" placeholder="Your Name" style="width: 30%; margin-bottom: 5px; padding: 5px;">
    <div style="display: flex;">
        <input type="text" id="message-input" placeholder="Type a message..." style="flex-grow: 1; padding: 5px;">
        <button id="send-btn" style="padding: 5px 15px; cursor: pointer;">Send</button>
    </div>
</div>

<script type="module">
  // FIXED IMPORTS HERE:
  import { initializeApp } from "https://gstatic.com";
  import { getDatabase, ref, push, onChildAdded } from "https://gstatic.com";

  const firebaseConfig = {
    apiKey: "AIzaSyDT7pUM1RUZdA9eskyQbtZ0eEfu4-aYoYY",
    authDomain: "school-chat-06.firebaseapp.com",
    databaseURL: "https://school-chat-06-default-rtdb.firebaseio.com",
    projectId: "school-chat-06",
    storageBucket: "school-chat-06.firebasestorage.app",
    messagingSenderId: "423053945988",
    appId: "1:423053945988:web:283ab19ea6bde24b5466d1",
    measurementId: "G-WFMB2M3EDM"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  const display = document.getElementById('messages');
  const input = document.getElementById('message-input');
  const user = document.getElementById('username');

  document.getElementById('send-btn').onclick = () => {
    if(input.value && user.value) {
      push(messagesRef, {
        username: user.value,
        text: input.value,
        time: Date.now()
      });
      input.value = '';
    }
  };

  onChildAdded(messagesRef, (snapshot) => {
    const msg = snapshot.val();
    const div = document.createElement('div');
    div.innerHTML = `<strong>${msg.username}:</strong> ${msg.text}`;
    div.style.padding = "2px 0";
    display.appendChild(div);
    display.scrollTop = display.scrollHeight;
  });
</script>
