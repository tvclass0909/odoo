<!DOCTYPE html>
<html>
<head>
    <title>Revision Notes</title>
</head>
<body style="margin:0; padding:10px; background:#fff;">

<div id="chat-app" style="font-family: sans-serif; border: 1px solid #ccc; background: #fff; padding: 10px; max-width: 400px; border-radius: 8px;">
    <div style="font-size: 10px; color: #888; margin-bottom: 5px;">
        Status: <span id="status" style="color: orange;">Connecting...</span>
    </div>
    <div id="messages" style="height: 250px; overflow-y: scroll; border-bottom: 1px solid #eee; margin-bottom: 10px; font-size: 13px; background: #fafafa; padding: 5px;"></div>
    
    <input type="text" id="username" placeholder="Name" style="width: 30%; margin-bottom: 5px; padding: 5px; border: 1px solid #ddd; border-radius: 4px;">
    
    <div style="display: flex; gap: 5px;">
        <input type="text" id="message-input" placeholder="Type a message..." style="flex-grow: 1; padding: 5px; border: 1px solid #ddd; border-radius: 4px;">
        <button id="send-btn" style="padding: 5px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;">Send</button>
    </div>
</div>

<script type="module">
  // 1. FIXED FULL LINKS
  import { initializeApp } from "https://gstatic.com";
  import { getDatabase, ref, push, onChildAdded, onValue } from "https://gstatic.com";

  const firebaseConfig = {
    apiKey: "AIzaSyDT7pUM1RUZdA9eskyQbtZ0eEfu4-aYoYY",
    authDomain: "school-chat-06.firebaseapp.com", // 2. FIXED THIS LINE
    databaseURL: "https://school-chat-06-default-rtdb.firebaseio.com",
    projectId: "school-chat-06",
    storageBucket: "school-chat-06.firebasestorage.app",
    messagingSenderId: "423053945988",
    appId: "1:423053945988:web:283ab19ea6bde24b5466d1",
    measurementId: "G-WFMB2M3EDM"
  };

  // Start Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  const display = document.getElementById('messages');
  const input = document.getElementById('message-input');
  const user = document.getElementById('username');
  const status = document.getElementById('status');

  // Connection Check
  const connectedRef = ref(db, ".info/connected");
  onValue(connectedRef, (snap) => {
    if (snap.val() === true) {
      status.innerText = "Online";
      status.style.color = "green";
    } else {
      status.innerText = "Connecting...";
      status.style.color = "orange";
    }
  });

  // Send Message
  document.getElementById('send-btn').onclick = () => {
    if(input.value && user.value) {
      push(messagesRef, {
        username: user.value,
        text: input.value,
        time: Date.now()
      }).catch(err => alert("Error: " + err.message));
      input.value = '';
    }
  };

  // Load Messages
  onChildAdded(messagesRef, (snapshot) => {
    const msg = snapshot.val();
    const div = document.createElement('div');
    div.innerHTML = `<span style="color:#007bff; font-weight:bold;">${msg.username}:</span> ${msg.text}`;
    div.style.margin = "5px 0";
    display.appendChild(div);
    display.scrollTop = display.scrollHeight;
  });
</script>

</body>
</html>
